{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block content %}

<h2>Registro</h2>

{% if error %}<div class="error">{{ error }}</div>{% endif %}
{% if success %}<div class="success">{{ success }}</div>{% endif %}

<label>Usuario:</label>
<input type="text" id="u" placeholder="Elige un usuario">

<label>Contraseña:</label>
<input type="password" id="p" placeholder="Elige una contraseña">

<button class="btn btn-green" onclick="enviar()">Registrarse</button>

<div class="divider">─────── o ───────</div>
<a href="/login" class="link-btn">Ya tengo cuenta</a>

<script>
function enviar(){
  const f = document.createElement('form');
  f.method = 'POST'; f.action = '/register';
  [['username', document.getElementById('u').value],
   ['password', document.getElementById('p').value]].forEach(([k,v]) => {
    const i = document.createElement('input');
    i.name = k; i.value = v; f.appendChild(i);
  });
  document.body.appendChild(f); f.submit();
}
</script>
{% endblock %}
